<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="description" content="Tech accessories store">

<meta name="keywords" content="keyboard, gaming mouse, headset">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tech Store</title>

<link rel="stylesheet" href="style.css">

<body>

<div class="cart">

</div>

<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">

</div>


<div class="product">
<img src="https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7">
<h3>Gaming Mouse</h3>
<p>High precision gaming mouse.</p>
<span class="price">$49</span>
<button onclick="addCart()">Add to Cart</button>
</div>


<div class="product">
<img src="https://images.unsplash.com/photo-1613141411244-0e4ac259d217">
<h3>Wireless Headset</h3>
<p>Surround sound wireless headset.</p>

</div>

</div>

</html>
