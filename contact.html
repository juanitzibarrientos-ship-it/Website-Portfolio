<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="scroll-progress"></div>

<nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="index.html">Juanito</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="#contactFormSection">Contact</a></li>
        <li class="nav-item"><button class="btn btn-sm btn-outline-primary ms-2" id="modeToggle">Dark/Light</button></li>
      </ul>
    </div>
  </div>
</nav>

<section class="container py-5" id="contactFormSection">
  <h2 class="text-center section-title mb-5 fade-in">Get in Touch</h2>
  <div class="row justify-content-center">
    <div class="col-lg-6 fade-in">
      <form id="contactForm">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" placeholder="Your Name">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="your@email.com">
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Message</label>
          <textarea class="form-control" id="message" rows="5" placeholder="Your message here..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
        <div id="successMessage" class="mt-3 alert alert-success" style="display:none;">Thank you! Your message has been sent.</div>
      </form>
    </div>
  </div>
</section>

</body>
