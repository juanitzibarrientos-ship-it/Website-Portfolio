<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | My Portfolio</title>
<meta name="description" content="Contact the web developer for projects and collaborations">
<meta name="keywords" content="contact web developer portfolio">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
/* ===== GENERAL ===== */
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f7f9;
    color: #333;
    scroll-behavior: smooth;
}

h1, h2, h3 {
    font-weight: 600;
}

/* ===== NAVBAR ===== */
.navbar {
    transition: background 0.3s;
}

.navbar .nav-link.active {
    color: #ffd700 !important;
    font-weight: 600;
}

/* ===== SCROLL PROGRESS BAR ===== */
#scroll-progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 5px;
    background: linear-gradient(to right, #00b4db, #0083b0);
    width: 0;
    z-index: 9999;
}

/* ===== FADE-IN ANIMATION ===== */
.fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
}

.fade-in.show {
    opacity: 1;
    transform: translateY(0);
}

/* ===== FORM STYLING ===== */
#contactForm .form-control {
    border-radius: 10px;
    transition: all 0.3s ease;
}

#contactForm .form-control:focus {
    border-color: #00b4db;
    box-shadow: 0 0 8px rgba(0, 180, 219, 0.3);
}

#contactForm .btn-primary {
    border-radius: 50px;
    padding: 12px 30px;
    transition: all 0.3s ease;
}

#contactForm .btn-primary:hover {
    transform: translateY(-3px);
}

/* ===== CONTACT INFO ===== */
.contact-info i {
    color: #00b4db;
    margin-right: 10px;
}

.contact-info a {
    color: inherit;
}

.contact-info a:hover {
    color: #ffd700;
}

/* ===== SOCIAL ICONS ===== */
.fa-2x {
    transition: transform 0.3s, color 0.3s;
}

.fa-2x:hover {
    transform: scale(1.2);
    color: #ffd700;
}

/* ===== MAP ===== */
.ratio iframe {
    border-radius: 15px;
}

/* ===== BACK TO TOP ===== */
#backToTop {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #0083b0;
    color: #fff;
    border: none;
    border-radius: 50%;
    padding: 12px 15px;
    font-size: 18px;
    cursor: pointer;
    display: none;
    z-index: 999;
    transition: all 0.3s ease;
}

#backToTop:hover {
    background: #00b4db;
    transform: translateY(-3px);
}
</style>

</head>

<body>

<!-- SCROLL PROGRESS BAR -->
<div id="scroll-progress"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">MyPortfolio</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
      </ul>
      <button id="modeToggle" class="btn btn-outline-light ms-3"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<section class="container text-center py-5 mt-5">
  <h1>Contact Me</h1>
  <p class="lead">Have a project in mind? Let's work together.</p>
</section>

<!-- CONTACT FORM & INFO -->
<section class="container pb-5">
  <div class="row g-4">
    <!-- FORM -->
    <div class="col-md-7 fade-in">
      <h3 class="mb-3">Send a Message</h3>
      <form id="contactForm">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" id="name" data-bs-toggle="tooltip" title="Enter your full name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" data-bs-toggle="tooltip" title="Enter a valid email address" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="5" id="message" data-bs-toggle="tooltip" title="Write your message here" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
      <div id="successMessage" class="alert alert-success mt-3" style="display:none;">
        Your message has been sent successfully!
      </div>
    </div>

    <!-- CONTACT INFO -->
    <div class="col-md-5 fade-in contact-info">
      <h3>Contact Information</h3>
      <p><i class="fa fa-envelope me-2"></i>email@example.com</p>
      <p><i class="fa fa-phone me-2"></i>+63 900 000 0000</p>
      <p><i class="fa fa-location-dot me-2"></i>Philippines</p>
      <hr>
      <h4>Follow Me</h4>
      <p>
        <a href="#"><i class="fab fa-facebook fa-2x me-3"></i></a>
        <a href="#"><i class="fab fa-instagram fa-2x me-3"></i></a>
        <a href="#"><i class="fab fa-twitter fa-2x me-3"></i></a>
        <a href="#"><i class="fab fa-github fa-2x"></i></a>
      </p>
    </div>
  </div>
</section>

<!-- MAP -->
<section class="container pb-5 fade-in">
  <h3 class="text-center mb-4">Location</h3>
  <div class="ratio ratio-16x9">
    <iframe src="https://maps.google.com/maps?q=philippines&t=&z=13&ie=UTF8&iwloc=&output=embed" allowfullscreen></iframe>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-4">
  <p>© 2026 My Portfolio</p>
</footer>

<!-- BACK TO TOP -->
<button id="backToTop"><i class="fas fa-arrow-up"></i></button>

<!-- JS LIBRARIES -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

<script>
// FADE IN ON SCROLL
$(window).scroll(function() {
  $(".fade-in").each(function() {
    let elementTop = $(this).offset().top;
    let windowBottom = $(window).scrollTop() + 600;
    if (elementTop < windowBottom) {
      $(this).addClass("show");
    }
  });
});

// BACK TO TOP BUTTON
$(window).scroll(function() {
  if ($(this).scrollTop() > 300) { $("#backToTop").fadeIn(); } 
  else { $("#backToTop").fadeOut(); }
});
$("#backToTop").click(function() {
  $("html, body").animate({scrollTop:0}, 600);
});
</script>

</body>
</html>
