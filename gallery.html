<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">

<!-- Custom JS -->
<script defer src="script.js"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">JTech</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavGallery">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavGallery">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
        <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
      <button class="btn btn-outline-light ms-3" onclick="toggleTheme()">Theme</button>
    </div>
  </div>
</nav>

<!-- Gallery Section -->
<section class="container my-5">
  <h2 class="text-center mb-4">Photo Gallery</h2>
  <div class="row g-3">

    <div class="col-md-4">
      <img src="assets/images/gallery1.jpg" class="img-fluid rounded gallery-img" alt="Gallery 1" onclick="openLightbox(this)">
    </div>
    <div class="col-md-4">
      <img src="assets/images/gallery2.jpg" class="img-fluid rounded gallery-img" alt="Gallery 2" onclick="openLightbox(this)">
    </div>
    <div class="col-md-4">
      <img src="assets/images/gallery3.jpg" class="img-fluid rounded gallery-img" alt="Gallery 3" onclick="openLightbox(this)">
    </div>

    <div class="col-md-4">
      <img src="assets/images/gallery4.jpg" class="img-fluid rounded gallery-img" alt="Gallery 4" onclick="openLightbox(this)">
    </div>
    <div class="col-md-4">
      <img src="assets/images/gallery5.jpg" class="img-fluid rounded gallery-img" alt="Gallery 5" onclick="openLightbox(this)">
    </div>
    <div class="col-md-4">
      <img src="assets/images/gallery6.jpg" class="img-fluid rounded gallery-img" alt="Gallery 6" onclick="openLightbox(this)">
    </div>

  </div>
</section>

<!-- Lightbox Modal -->
<div id="lightbox" class="d-flex position-fixed top-0 start-0 w-100 h-100 justify-content-center align-items-center bg-dark bg-opacity-75" style="display:none;" onclick="closeLightbox()">
  <img id="lightbox-img" src="" class="img-fluid rounded">
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
  <p>© 2026 Juanito Portfolio</p>
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
